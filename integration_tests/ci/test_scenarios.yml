schema_variable_name: "intercom_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "optional features disabled"
    vars:
      intercom__using_articles: false
      intercom__using_contact_company: false
      intercom__using_company_tags: false
      intercom__using_contact_tags: false
      intercom__using_conversation_tags: false
      intercom__using_team: false
    include_incremental: false

  - name: "collection history disabled"
    vars:
      intercom__using_collection_history: false
    include_incremental: false

  - name: "help center history disabled"
    vars:
      intercom__using_help_center_history: false
    include_incremental: false